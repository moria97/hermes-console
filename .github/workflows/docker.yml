name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we intend to push (never on PRs from forks).
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push: hermes-console:main, hermes-console:main-<short-sha>
            type=ref,event=branch
            type=sha,format=short,prefix=
            # PRs from same repo: hermes-console:pr-<n>
            type=ref,event=pr
            # Semver tags (v1.2.3 → 1.2.3 + 1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # `latest` only on default branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hermes-console
            org.opencontainers.image.description=Single-image control panel for hermes-agent
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only amd64 for now — base image `nousresearch/hermes-agent:latest`
          # is also amd64. Add `linux/arm64` here if upstream publishes it.
          platforms: linux/amd64
