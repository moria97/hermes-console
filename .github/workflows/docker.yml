name: docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository }}
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_IMAGE: registry.cn-hangzhou.aliyuncs.com/mybigpai/hermes-console

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Date-based tag (YYYY.M.D, no zero padding), e.g. 2026.4.23 — matches the
      # version scheme used internally for pai-eas releases.
      - name: Compute date tag
        id: date
        run: echo "value=$(date +%Y.%-m.%-d)" >> "$GITHUB_OUTPUT"

      # Only log in to registries when we're actually pushing (skip PRs from
      # forks; their GITHUB_TOKEN can't write to GHCR and ACR secrets leak).
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USER }}
          password: ${{ secrets.ACR_SECRET }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Each tag rule below is applied to BOTH images — single build,
          # pushed to ghcr.io and Aliyun ACR in one step.
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
            ${{ env.ACR_IMAGE }}
          tags: |
            # Date tag (primary) — e.g. 2026.4.23
            type=raw,value=${{ steps.date.outputs.value }}
            # Branch push: :main + :<short-sha>
            type=ref,event=branch
            type=sha,format=short,prefix=
            # Semver tags (v1.2.3 → 1.2.3 + 1.2)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest only on default-branch push
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=hermes-console
            org.opencontainers.image.description=Single-image control panel for hermes-agent
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
